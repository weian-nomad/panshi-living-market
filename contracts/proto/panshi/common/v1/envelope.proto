syntax = "proto3";

package panshi.common.v1;

enum HistoricalMode {
  HISTORICAL_MODE_UNSPECIFIED = 0;
  HISTORICAL_MODE_ISOLATED = 1;
}

enum TruthClass {
  TRUTH_CLASS_UNSPECIFIED = 0;
  TRUTH_CLASS_REAL_FACT = 1;
  TRUTH_CLASS_STATISTICAL_SAMPLE = 2;
  TRUTH_CLASS_FICTIONAL_SETTING = 3;
  TRUTH_CLASS_SYMBOLIC_INTERPRETATION = 4;
  TRUTH_CLASS_SIMULATED_NARRATIVE = 5;
}

enum CommandDisposition {
  COMMAND_DISPOSITION_UNSPECIFIED = 0;
  COMMAND_DISPOSITION_COMMITTED = 1;
  COMMAND_DISPOSITION_PENDING = 2;
  COMMAND_DISPOSITION_DUPLICATE = 3;
  COMMAND_DISPOSITION_REJECTED = 4;
}

message StreamRef {
  string stream_type = 1;
  bytes stream_id = 2;
}

message StreamPrecondition {
  StreamRef stream = 1;
  uint64 expected_version = 2;
}

message ActorRef {
  string actor_type = 1;
  bytes actor_id = 2;
}

message CommandEnvelope {
  bytes command_id = 1;
  string command_type = 2;
  string command_owner = 3;
  StreamRef primary_target = 4;
  repeated StreamPrecondition preconditions = 5;
  bytes logical_cell_id = 6;
  uint64 ownership_epoch = 7;
  string idempotency_key = 8;
  HistoricalMode mode = 9;
  ActorRef actor = 10;
  int64 deadline_unix_micros = 11;
  bytes payload = 12;
  bytes trace_id = 13;
  bytes request_hash = 14;
}

message EventEnvelope {
  bytes event_id = 1;
  string event_type = 2;
  uint32 schema_version = 3;
  string stream_type = 4;
  bytes stream_id = 5;
  uint64 stream_version = 6;
  bytes logical_cell_id = 7;
  uint64 ownership_epoch = 8;
  HistoricalMode mode = 9;
  bytes command_id = 10;
  bytes causation_id = 11;
  bytes correlation_id = 12;
  bytes trace_id = 13;
  ActorRef actor = 14;
  int64 occurred_at_unix_micros = 15;
  int64 recorded_at_unix_micros = 16;
  string policy_revision = 17;
  string model_revision = 18;
  string fact_revision = 19;
  bytes engine_artifact_digest = 20;
  string rights_scope = 21;
  string data_class = 22;
  uint64 visibility_epoch = 23;
  bytes payload_hash = 24;
  bytes previous_event_hash = 25;
  bytes payload = 26;
}

message CommandReceipt {
  bytes command_id = 1;
  CommandDisposition disposition = 2;
  uint64 canonical_version = 3;
  bool retryable = 4;
  string reason_code = 5;
  string status_resource = 6;
}

message ReplayPatch {
  string patch_schema_revision = 1;
  bytes forward_patch = 2;
  bytes inverse_patch = 3;
}

message ImmutableSection {
  string schema_revision = 1;
  bytes content = 2;
  bytes digest = 3;
}
