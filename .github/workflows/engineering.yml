name: Engineering gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  contracts-and-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - name: Install pinned pnpm
        run: npm install --global pnpm@11.15.0
      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate public OpenAPI
        run: pnpm contracts:lint
      - name: Regenerate public client
        run: pnpm contracts:generate
      - name: Reject generated-client drift
        run: git diff --exit-code -- apps/web/src/api/generated
      - name: Audit command and event catalog
        run: ruby tools/contract-audit.rb
      - name: Verify sealed historical fixtures
        run: ruby tools/fixture-audit.rb
      - name: Audit sealed market facts
        run: node tools/sealed-fact-audit.mjs
      - name: Audit sealed study release
        run: node tools/study-release-audit.mjs
      - name: Type-check workspaces
        run: pnpm --recursive --if-present check
      - name: Test web rules
        run: pnpm test
      - name: Build web client
        env:
          VITE_STUDY_BUILD_ID: study-2026-07-21.3
        run: pnpm build
      - name: Build sealed study container
        run: docker build --file deploy/study/Dockerfile --build-arg RELEASE_REVISION="${{ github.sha }}" --tag panshi-study-ci .
      - name: Smoke sealed study container
        run: |
          docker network create panshi-study-ci
          docker run --detach \
            --name panshi-study-ci \
            --network panshi-study-ci \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --pids-limit 64 \
            --memory 128m \
            --cpus 0.5 \
            --tmpfs /tmp:rw,noexec,nosuid,size=8m,uid=10001,gid=10001 \
            --tmpfs /data:rw,noexec,nosuid,size=8m,uid=10001,gid=10001 \
            --tmpfs /config:rw,noexec,nosuid,size=8m,uid=10001,gid=10001 \
            --publish 127.0.0.1:8080:8080 \
            panshi-study-ci
          deploy/study/smoke.sh http://127.0.0.1:8080
          docker exec panshi-study-ci grep -Eq '^CapBnd:[[:space:]]*0000000000000000$' /proc/1/status
          test "$(docker inspect --format '{{.State.Status}}' panshi-study-ci)" = running
      - name: Stop study container
        if: always()
        run: |
          docker rm --force panshi-study-ci || true
          docker network rm panshi-study-ci || true

  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.14-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: panshi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d panshi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PANSHI_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/panshi_test
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned Rust toolchain
        run: rustup show
      - name: Install pinned Buf
        run: tools/contracts/install-buf.sh
      - name: Lint Protobuf contracts
        env:
          BUF_CACHE_DIR: ${{ runner.temp }}/buf-cache
        run: .tools/bin/buf lint
      - name: Enforce crate boundaries
        run: tools/contracts/check-boundaries.sh
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test native workspace
        run: cargo test --workspace --locked
      - name: Install pinned Wasmtime
        run: |
          curl --fail --silent --show-error --location \
            --output "${RUNNER_TEMP}/wasmtime.tar.xz" \
            https://github.com/bytecodealliance/wasmtime/releases/download/v45.0.0/wasmtime-v45.0.0-x86_64-linux.tar.xz
          echo "9d92e6dc04630f617e0e5d532327a5a917ac4898587e07f4fb7a5fc7fffef760  ${RUNNER_TEMP}/wasmtime.tar.xz" | sha256sum --check
          tar --extract --xz --file "${RUNNER_TEMP}/wasmtime.tar.xz" --directory "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/wasmtime-v45.0.0-x86_64-linux" >> "${GITHUB_PATH}"
      - name: Compare native and WASI canonical bytes
        run: tools/verify-kernel-parity.sh
