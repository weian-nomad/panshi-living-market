name: Contract audit

on:
  pull_request:
    paths:
      - "contracts/**"
      - "docs/architecture/**"
      - "tools/contract-audit.rb"
      - ".github/workflows/contract-audit.yml"
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - "docs/architecture/**"
      - "tools/contract-audit.rb"
      - ".github/workflows/contract-audit.yml"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - run: ruby tools/contract-audit.rb
